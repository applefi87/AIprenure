name: Merge to Dev (Privileged)

on:
  # 由編排器透過 GitHub API 觸發（workflow_dispatch）
  # 不接受直接 push 觸發，確保合併由編排器控制
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to merge"
        required: true
        type: string
      card_id:
        description: "Card ID for audit trail"
        required: true
        type: string

jobs:
  merge:
    runs-on: ubuntu-latest
    # 只允許在 dev 分支合併，不能合 main
    environment: dev-merge
    steps:
      - name: Merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MERGE_BOT_TOKEN }}
          script: |
            const pr_number = parseInt('${{ inputs.pr_number }}');
            const card_id = '${{ inputs.card_id }}';

            console.log(`Merging PR #${pr_number} for card ${card_id}`);

            // 確認 CI 是綠的
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
            });

            if (pr.data.mergeable_state !== 'clean') {
              core.setFailed(`PR #${pr_number} is not mergeable: ${pr.data.mergeable_state}`);
              return;
            }

            // 執行合併
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              merge_method: 'squash',
              commit_title: `feat(${card_id}): merge to dev`,
              commit_message: `Automated merge by orchestrator. Card: ${card_id}`,
            });

            console.log(`✅ PR #${pr_number} merged successfully`);
